name: Run Tests

on:
   push:
   workflow_dispatch:


jobs:
   lint_job:
      runs-on: ubuntu-latest
      steps:
         - name: checkout code
           uses:  actions/checkout@v4

         - name: run the script
           run: bash scripts/run-lint.sh

   test_job:
      runs-on: ubuntu-latest
      needs:
         - lint_job
      strategy:
         matrix:
           environment: [dev, staging, prod]
      steps:
         - name: checkout code
           uses: actions/checkout@v4

         - name: print environment
           run:  echo "printing enivorment: ${{ matrix.environment }}"

         - name: run test script
           run:  bash scripts/run-tests.sh